<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teachable Machine</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --accent-dark: #4834d4;
      --surface: #f8f7ff;
      --card-bg: #ffffff;
      --text-main: #2d3436;
      --text-muted: #636e72;
      --border: #dfe6e9;
    }
 
    * { box-sizing: border-box; }
 
    body {
      background: linear-gradient(135deg, #f8f7ff 0%, #e8e4ff 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text-main);
    }
 
    .hero-header {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: white;
      padding: 2rem 1rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
 
    .hero-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -20%;
      width: 140%;
      height: 200%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
 
    .hero-header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }
 
    .hero-header p {
      font-size: 0.95rem;
      opacity: 0.85;
      margin: 0;
    }
 
    .hero-icon {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
      display: block;
    }
 
    .main-card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(108, 92, 231, 0.12);
      border: 1px solid rgba(108, 92, 231, 0.08);
      overflow: hidden;
      margin-top: -1.5rem;
    }
 
    .webcam-wrapper {
      background: #0f0e17;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      position: relative;
      border: 2px solid rgba(108, 92, 231, 0.25);
    }
 
    .webcam-wrapper canvas {
      border-radius: 14px;
      max-width: 100%;
      height: auto;
      display: block;
    }
 
    .webcam-placeholder {
      text-align: center;
      color: rgba(255,255,255,0.45);
    }
 
    .webcam-placeholder i {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
    }
 
    .webcam-placeholder span {
      font-size: 0.85rem;
    }
 
    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      border: none;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.35);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
 
    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(108, 92, 231, 0.45);
      background: linear-gradient(135deg, var(--accent-dark), #3c25c7);
      color: white;
    }
 
    .btn-start:active {
      transform: translateY(0px);
      box-shadow: 0 3px 12px rgba(108, 92, 231, 0.3);
    }
 
    .btn-start:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
 
    .btn-start .spinner-border {
      width: 1rem;
      height: 1rem;
      border-width: 2px;
    }
 
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
 
    .prediction-item {
      margin-bottom: 1.1rem;
    }
 
    .prediction-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.35rem;
    }
 
    .prediction-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-main);
    }
 
    .prediction-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 42px;
      text-align: right;
    }
 
    .progress {
      height: 10px;
      border-radius: 50px;
      background: #ede9fe;
    }
 
    .progress-bar {
      border-radius: 50px;
      background: linear-gradient(90deg, var(--accent-light), var(--accent));
      transition: width 0.3s ease;
    }
 
    .progress-bar.high {
      background: linear-gradient(90deg, #00b894, #00cec9);
    }
 
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
    }
 
    .status-idle {
      background: #f1f0ff;
      color: var(--accent);
    }
 
    .status-loading {
      background: #fff3cd;
      color: #856404;
    }
 
    .status-active {
      background: #d1fae5;
      color: #065f46;
    }
 
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      display: inline-block;
    }
 
    .status-active .status-dot {
      animation: pulse 1.2s infinite;
    }
 
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }
 
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }
 
    .footer-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }
 
    .footer-note a {
      color: var(--accent);
      text-decoration: none;
    }
 
    .footer-note a:hover {
      text-decoration: underline;
    }
 
    @media (max-width: 576px) {
      .hero-header { padding: 1.5rem 1rem 2.5rem; }
      .main-card { border-radius: 16px; margin-top: -1rem; }
    }
  </style>
</head>
<body>
 
  <div class="hero-header">
    <i class="bi bi-cpu-fill hero-icon"></i>
    <h1>Teachable Machine</h1>
    <p>Classificação de imagens em tempo real com IA</p>
  </div>
 
  <div class="container pb-5" style="max-width: 680px;">
    <div class="main-card">
 
      <!-- Webcam Section -->
      <div class="p-4 pb-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <p class="section-label mb-0">Câmera ao vivo</p>
          <span class="status-badge status-idle" id="status-badge">
            <span class="status-dot"></span>
            <span id="status-text">Inativo</span>
          </span>
        </div>
 
        <div class="webcam-wrapper" id="webcam-container">
          <div class="webcam-placeholder" id="placeholder">
            <i class="bi bi-camera-video-off"></i>
            <span>Câmera desativada</span>
          </div>
        </div>
 
        <div class="text-center mt-4">
          <button class="btn-start" id="startBtn" onclick="init()">
            <i class="bi bi-camera-video-fill"></i>
            Ativar câmera e iniciar
          </button>
        </div>
      </div>
 
      <hr class="divider" />
 
      <!-- Predictions Section -->
      <div class="p-4">
        <p class="section-label">Resultados da classificação</p>
        <div id="label-container">
          <div class="text-center py-3" style="color: var(--text-muted); font-size: 0.88rem;">
            <i class="bi bi-bar-chart-line" style="font-size: 1.5rem; display: block; margin-bottom: 0.5rem; opacity: 0.4;"></i>
            Inicie a câmera para ver as predições
          </div>
        </div>
      </div>
 
      <hr class="divider" />
 
      <div class="p-3">
        <p class="footer-note mb-0">
          Modelo fornecido pelo
          <a href="https://teachablemachine.withgoogle.com/" target="_blank">Google Teachable Machine</a>
          &middot; Processamento local no navegador
        </p>
      </div>
 
    </div>
  </div>
 
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/rrp8HAymG/";
    let model, webcam, labelContainer, maxPredictions;
    let started = false;
 
    function setStatus(state) {
      const badge = document.getElementById('status-badge');
      const text = document.getElementById('status-text');
      badge.className = 'status-badge';
      if (state === 'loading') {
        badge.classList.add('status-loading');
        text.textContent = 'Carregando...';
      } else if (state === 'active') {
        badge.classList.add('status-active');
        text.textContent = 'Ativo';
      } else {
        badge.classList.add('status-idle');
        text.textContent = 'Inativo';
      }
    }
 
    async function init() {
      if (started) return;
      started = true;
 
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border"></span> Carregando modelo...';
      setStatus('loading');
 
      try {
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        maxPredictions = model.getTotalClasses();
 
        btn.innerHTML = '<span class="spinner-border"></span> Acessando câmera...';
 
        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);
 
        const container = document.getElementById("webcam-container");
        document.getElementById('placeholder').remove();
        webcam.canvas.style.maxWidth = '100%';
        webcam.canvas.style.height = 'auto';
        container.appendChild(webcam.canvas);
 
        btn.innerHTML = '<i class="bi bi-camera-video-fill"></i> Câmera ativa';
        btn.style.background = 'linear-gradient(135deg, #00b894, #00cec9)';
        setStatus('active');
 
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = '';
 
        for (let i = 0; i < maxPredictions; i++) {
          const item = document.createElement('div');
          item.className = 'prediction-item';
          item.innerHTML = `
            <div class="prediction-header">
              <span class="prediction-name" id="name-${i}">Classe ${i + 1}</span>
              <span class="prediction-value" id="val-${i}">0%</span>
            </div>
            <div class="progress">
              <div class="progress-bar" id="bar-${i}" style="width: 0%;" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
          `;
          labelContainer.appendChild(item);
        }
 
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-camera-video-fill"></i> Tentar novamente';
        setStatus('idle');
        started = false;
        console.error(err);
        alert('Erro ao iniciar: ' + err.message);
      }
    }
 
    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }
 
    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const pct = Math.round(prob * 100);
        document.getElementById(`name-${i}`).textContent = prediction[i].className;
        document.getElementById(`val-${i}`).textContent = pct + '%';
        const bar = document.getElementById(`bar-${i}`);
        bar.style.width = pct + '%';
        bar.setAttribute('aria-valuenow', pct);
        bar.className = 'progress-bar' + (pct >= 70 ? ' high' : '');
      }
    }
  </script>
 
</body>
</html>
